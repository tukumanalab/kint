openapi: 3.1.0
info:
  title: Kint Attendance API
  version: 1.0.0
  description: >-
    Kint NFC勤怠管理システムの API 契約書。
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: User
  - name: Punch
  - name: Card
  - name: Attendance
  - name: Shift
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Web 管理画面ユーザーのログイン
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: 現在のログインユーザー情報を取得
      responses:
        '200':
          description: 現在のユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/profile:
    patch:
      tags: [User]
      summary: マイページのプロフィールを更新（本人）
      description: >-
        ログイン中ユーザー本人のプロフィール（name, full_name）を更新します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeProfileUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/email-change-requests:
    post:
      tags: [User]
      summary: メールアドレス変更確認メールを送信（本人）
      description: >-
        ログイン中ユーザー本人の新しいメールアドレス宛に確認メールを送信します。
        メールアドレス自体は承認リンクが開かれるまで更新しません。
        メール送信は Gmail API（OAuth 2.0 クライアント認証）で実行します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeRequestCreate'
      responses:
        '202':
          description: 確認メール送信受付
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestAcceptedResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: メールアドレス重複または未完了リクエスト競合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 入力バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Gmail API 送信失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/password:
    patch:
      tags: [User]
      summary: マイページのパスワードを更新（本人）
      description: >-
        current_password と new_password を受け取り、本人のパスワードを変更します。
        更新成功時は現在セッションを無効化して再認証を要求します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: 更新成功（セッション無効化済み）
        '401':
          description: 未認証または current_password 不一致
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 入力バリデーションエラー（同一パスワードを含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /email-verifications/confirm:
    post:
      tags: [User]
      security: []
      summary: メール確認トークンを確定
      description: >-
        確認メール内の承認リンクから取得した token を使い、signup または email_change を確定します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: 確認完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmResponse'
        '400':
          description: token 無効、期限切れ、使用済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    post:
      tags: [User]
      summary: ユーザー登録（管理者）
      description: >-
        name, full_name, email, role, password を受け取りユーザーを作成します。
        password は 8〜72 文字かつ英字・数字を各1文字以上含む必要があります。
        作成時に Gmail API（OAuth 2.0 クライアント認証）経由で確認メールを送信し、承認完了までメール未確認状態とします。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Gmail API（OAuth クライアント）送信失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: 入力バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: メールアドレス重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{user_id}:
    patch:
      tags: [User]
      summary: ユーザー修正（管理者）
      description: >-
        name, full_name, email, role, is_active を部分更新します。
        空の更新要求は受け付けません。最後の有効な admin を無効化する更新は拒否します。
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: ユーザー修正成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: メールアドレス重複または最後の有効 admin の無効化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 入力バリデーションエラー（空更新要求を含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象ユーザーなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [User]
      summary: ユーザー削除（管理者、論理削除）
      description: >-
        物理削除は行わず is_active=false で論理削除します。
        既に論理削除済みの場合は冪等に 204 を返します。
        最後の有効な admin は削除できません。
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: ユーザー削除成功（is_active=false）
        '409':
          description: 最後の有効 admin の削除要求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象ユーザーなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /punches:
    post:
      tags: [Punch]
      summary: Web アプリから打刻を登録（WebUSB NFC または user_id）
      description: >-
        通常は WebUSB 経由で取得した card_idm で打刻します。カード忘れ時は user_id での打刻を許可します。
        user_id 打刻時は reason を必須とします。
        このエンドポイントは認証不要です（ログインなしで打刻できます）。
      security: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PunchRequest'
      responses:
        '200':
          description: 打刻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PunchResponse'
        '404':
          description: カード未登録またはユーザー未登録
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 競合（二重打刻または不正な状態遷移）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cards/registrations:
    post:
      tags: [Card]
      summary: Web アプリから NFC カードを利用者へ登録（WebUSB）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRegistrationRequest'
      responses:
        '201':
          description: カード登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardRegistrationResponse'
        '409':
          description: カード競合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attendance:
    get:
      tags: [Attendance]
      summary: 勤怠一覧を取得
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: user_id
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: 勤怠一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceListResponse'

  /attendance/{attendance_id}:
    patch:
      tags: [Attendance]
      summary: 勤怠記録を修正（本人または管理者）
      description: >-
        利用者本人は自分の勤怠記録のみ修正できます。管理者は全利用者の勤怠記録を修正できます。
        修正時は reason が必須で、変更前後の値、実行者、実行日時、修正理由を変更履歴として必ず保存します。
      parameters:
        - in: path
          name: attendance_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendancePatchRequest'
      responses:
        '200':
          description: 勤怠修正成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '403':
          description: 権限不足（他人の勤怠記録を修正しようとした場合を含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象レコードなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attendance/{attendance_id}/history:
    get:
      tags: [Attendance]
      summary: 勤怠変更履歴を取得（本人または管理者）
      description: >-
        利用者本人は自分の勤怠記録の変更履歴を取得できます。管理者は全利用者の変更履歴を取得できます。
      parameters:
        - in: path
          name: attendance_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 勤怠変更履歴
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceHistoryResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象レコードなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /shifts/sync:
    post:
      tags: [Shift]
      summary: Google Calendar 同期を実行
      responses:
        '202':
          description: 同期受付完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftSyncAcceptedResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required: [id, role, name, full_name, email]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [admin, employee]
        name:
          type: string
        full_name:
          type: string
          description: 本名（氏名）
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        email_verification_status:
          type: string
          enum: [pending, verified]

    UserCreateRequest:
      type: object
      required: [name, full_name, email, role, password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        full_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, employee]
        password:
          type: string
          minLength: 8
          maxLength: 72
          pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'

    UserUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        full_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, employee]
        is_active:
          type: boolean

    MeProfileUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        full_name:
          type: string
          minLength: 1
          maxLength: 100

    EmailChangeRequestCreate:
      type: object
      required: [new_email]
      properties:
        new_email:
          type: string
          format: email

    EmailChangeRequestAcceptedResponse:
      type: object
      required: [status, requested_email]
      properties:
        status:
          type: string
          enum: [pending_confirmation]
        requested_email:
          type: string
          format: email
        expires_at:
          type: string
          format: date-time

    EmailVerificationConfirmRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    EmailVerificationConfirmResponse:
      type: object
      required: [verification_type, email, status]
      properties:
        verification_type:
          type: string
          enum: [signup, email_change]
        email:
          type: string
          format: email
        status:
          type: string
          enum: [confirmed]

    PasswordChangeRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 8
        new_password:
          type: string
          minLength: 8
          maxLength: 72
          pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'

    UserResponse:
      type: object
      required: [id, name, full_name, email, role, is_active, email_verification_status]
      properties:
        id:
          type: string
        name:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, employee]
        is_active:
          type: boolean
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        email_verification_status:
          type: string
          enum: [pending, verified]

    PunchRequest:
      type: object
      required: [device_id, occurred_at]
      oneOf:
        - required: [card_idm]
        - required: [user_id, reason]
      properties:
        card_idm:
          type: string
          description: FeliCa の IDm
        user_id:
          type: string
          description: カード忘れ時に使用するユーザーID
        reason:
          type: string
          description: user_id 打刻時の理由
          minLength: 1
        device_id:
          type: string
        occurred_at:
          type: string
          format: date-time

    PunchResponse:
      type: object
      required: [attendance_id, user_id, action, occurred_at, message]
      properties:
        attendance_id:
          type: string
        user_id:
          type: string
        action:
          type: string
          enum: [check_in, check_out]
        occurred_at:
          type: string
          format: date-time
        method:
          type: string
          enum: [card_idm, user_id]
          description: 打刻に使用した識別方法
        message:
          type: string

    CardRegistrationRequest:
      type: object
      required: [user_id, card_idm]
      properties:
        user_id:
          type: string
        card_idm:
          type: string

    CardRegistrationResponse:
      type: object
      required: [card_id, user_id, card_idm, is_active]
      properties:
        card_id:
          type: string
        user_id:
          type: string
        card_idm:
          type: string
        is_active:
          type: boolean

    AttendanceRecord:
      type: object
      required: [id, user_id, work_date]
      properties:
        id:
          type: string
        user_id:
          type: string
        card_idm:
          type: string
          nullable: true
        work_date:
          type: string
          format: date
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        source:
          type: string
          enum: [webusb_nfc, web_user_id, admin_manual, self_service]
        updated_reason:
          type: string
          nullable: true
        last_updated_at:
          type: string
          format: date-time
          nullable: true
        last_updated_by_user_id:
          type: string
          nullable: true

    AttendanceHistorySnapshot:
      type: object
      properties:
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true

    AttendanceHistoryEntry:
      type: object
      required: [id, attendance_id, actor_user_id, actor_role, changed_at, before, after, reason]
      properties:
        id:
          type: string
        attendance_id:
          type: string
        actor_user_id:
          type: string
        actor_role:
          type: string
          enum: [admin, employee]
        changed_at:
          type: string
          format: date-time
        before:
          $ref: '#/components/schemas/AttendanceHistorySnapshot'
        after:
          $ref: '#/components/schemas/AttendanceHistorySnapshot'
        reason:
          type: string

    AttendanceListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecord'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    AttendancePatchRequest:
      type: object
      required: [reason]
      properties:
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          minLength: 1
          description: 修正理由。監査ログに保存されます。

    AttendanceHistoryResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceHistoryEntry'
        total:
          type: integer

    ShiftSyncAcceptedResponse:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [accepted]

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 機械判読用エラーコード
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
