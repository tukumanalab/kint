<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- グラデーションの定義。プレミアムな紫〜赤〜オレンジのグラデーション -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e14ff" />
      <stop offset="100%" stop-color="#47bfff" />
    </linearGradient>
    <linearGradient id="k-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0f7ff" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景の角丸四角形（テーマに合わせたパープル〜シアンのグラデーション） -->
  <rect width="100" height="100" rx="24" fill="url(#bg-grad)" />
  
  <!-- 勤怠管理・スマートさを象徴する時計の文字盤を模したドットサークル -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2.5" stroke-dasharray="3 5" />
  
  <!-- "K" のモダンなグラフィックデザイン -->
  <!-- 左側の縦線（ICカードや柱） -->
  <rect x="28" y="24" width="10" height="52" rx="5" fill="url(#k-grad)" filter="url(#shadow)" />
  
  <!-- 右上の斜めライン -->
  <path d="M38 52 L 64 26 A 5 5 0 0 1 71 33 L 47 57 Z" fill="url(#k-grad)" filter="url(#shadow)" />
  
  <!-- 右下の斜めライン -->
  <path d="M43 47 L 70 74 A 5 5 0 0 1 63 81 L 38 56 Z" fill="url(#k-grad)" filter="url(#shadow)" />
  
  <!-- 非接触タッチや電波をイメージした中央の光るドット -->
  <circle cx="43" cy="51" r="3.5" fill="#ffffff" />
</svg>