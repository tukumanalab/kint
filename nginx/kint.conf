server {
    listen 80;
    server_name localhost; # 必要に応じてドメイン名またはIPアドレスに変更してください。

    # フロントエンドのビルド成果物 (dist) が配置されている絶対パスを指定します。
    # 例: /var/www/kint/frontend/dist
    root /var/www/kint/frontend/dist;
    index index.html;

    # ログ設定 (必要に応じてパスを変更してください)
    access_log /var/log/nginx/kint_access.log;
    error_log /var/log/nginx/kint_error.log;

    # Gzip 圧縮の設定
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA ルーティングと Google OAuth2 redirect モードの POST / コールバックのハンドリング
    location / {
        # Google OAuth2 の redirect モードでは Google から POST / で認証情報が送信されます。
        # POST / のリクエストのみ、FastAPI バックエンドに転送します。
        if ($request_method = POST) {
            proxy_pass http://127.0.0.1:8000;
            break;
        }

        # それ以外の GET 等のリクエストは、静的ファイルが存在すればそれを返し、
        # 存在しなければ index.html にフォールバックします（SPAクライアントルーティング用）。
        try_files $uri $uri/ /index.html;
    }

    # バックエンド API へのプロキシ
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # クライアントIP情報の伝達
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API ドキュメント (Swagger UI / Redoc) へのプロキシ
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
