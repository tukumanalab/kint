openapi: 3.1.0
info:
  title: Kint Attendance API
  version: 1.0.0
  description: >-
    Kint NFC勤怠管理システムの API 契約書。
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: User
  - name: Punch
  - name: Card
  - name: Attendance
  - name: Shift
  - name: Settings
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Web 管理画面ユーザーのログイン
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: 現在のログインユーザー情報を取得
      responses:
        '200':
          description: 現在のユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/profile:
    patch:
      tags: [User]
      summary: マイページのプロフィールを更新（本人）
      description: >-
        ログイン中ユーザー本人のプロフィール（name, full_name）を更新します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeProfileUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/email-change-requests:
    post:
      tags: [User]
      summary: メールアドレス変更確認メールを送信（本人）
      description: >-
        ログイン中ユーザー本人の新しいメールアドレス宛に確認メールを送信します。
        メールアドレス自体は承認リンクが開かれるまで更新しません。
        メール送信は Gmail API（OAuth 2.0 クライアント認証）で実行します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeRequestCreate'
      responses:
        '202':
          description: 確認メール送信受付
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestAcceptedResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: メールアドレス重複または未完了リクエスト競合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 入力バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Gmail API 送信失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/password:
    patch:
      tags: [User]
      summary: マイページのパスワードを更新（本人）
      description: >-
        current_password と new_password を受け取り、本人のパスワードを変更します。
        更新成功時は現在セッションを無効化して再認証を要求します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: 更新成功（セッション無効化済み）
        '401':
          description: 未認証または current_password 不一致
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 入力バリデーションエラー（同一パスワードを含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /email-verifications/confirm:
    post:
      tags: [User]
      security: []
      summary: メール確認トークンを確定
      description: >-
        確認メール内の承認リンクから取得した token を使い、signup または email_change を確定します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: 確認完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmResponse'
        '400':
          description: token 無効、期限切れ、使用済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    post:
      tags: [User]
      summary: ユーザー登録（管理者）
      description: >-
        name, full_name, email, role, password を受け取りユーザーを作成します。
        password は 8〜72 文字かつ英字・数字を各1文字以上含む必要があります。
        作成時に Gmail API（OAuth 2.0 クライアント認証）経由で確認メールを送信し、承認完了までメール未確認状態とします。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Gmail API（OAuth クライアント）送信失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: 入力バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: メールアドレス重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{user_id}:
    patch:
      tags: [User]
      summary: ユーザー修正（管理者）
      description: >-
        name, full_name, email, role, is_active を部分更新します。
        空の更新要求は受け付けません。最後の有効な admin を無効化する更新は拒否します。
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: ユーザー修正成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: メールアドレス重複または最後の有効 admin の無効化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 入力バリデーションエラー（空更新要求を含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象ユーザーなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [User]
      summary: ユーザー削除（管理者、論理削除）
      description: >-
        物理削除は行わず is_active=false で論理削除します。
        既に論理削除済みの場合は冪等に 204 を返します。
        最後の有効な admin は削除できません。
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: ユーザー削除成功（is_active=false）
        '409':
          description: 最後の有効 admin の削除要求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象ユーザーなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /punches/users:
    get:
      tags: [Punch]
      summary: カード忘れ打刻向けユーザー候補検索
      description: >-
        表示名・氏名・ユーザーIDの一部で、カード忘れ打刻用の候補ユーザーを検索します。
        返却対象は有効ユーザーのみです。
        このエンドポイントは認証不要です（ログインなしで候補検索できます）。
      security: []
      parameters:
        - in: query
          name: q
          required: true
          description: 検索キーワード（表示名/氏名/ユーザーIDの部分一致）
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        '200':
          description: 検索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PunchUserCandidateListResponse'
        '422':
          description: クエリ不備
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /punches:
    post:
      tags: [Punch]
      summary: Web アプリから打刻を登録（WebUSB NFC または user_id）
      description: >-
        通常は WebUSB 経由で取得した card_idm で打刻します。カード忘れ時は候補検索で選択した user_id での打刻を許可します。
        user_id 打刻時は reason を必須とします。
        出勤判定時にシフト外の場合は、即時確定せず `status=requires_confirmation` を返します。
        その場合は `confirm=true` を付与して再送することで出勤を確定できます。
        このエンドポイントは認証不要です（ログインなしで打刻できます）。
      security: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PunchRequest'
      responses:
        '200':
          description: 打刻成功または確認要求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PunchResponse'
        '404':
          description: カード未登録またはユーザー未登録
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 競合（クールダウン中の連続打刻など）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cards/registrations:
    post:
      tags: [Card]
      summary: Web アプリから NFC カードを利用者へ登録（WebUSB）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRegistrationRequest'
      responses:
        '201':
          description: カード登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardRegistrationResponse'
        '409':
          description: カード競合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attendance:
    get:
      tags: [Attendance]
      summary: 勤怠一覧を取得
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: user_id
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: 勤怠一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceListResponse'

  /attendance/{attendance_id}:
    patch:
      tags: [Attendance]
      summary: 勤怠記録を修正（本人または管理者）
      description: >-
        利用者本人は自分の勤怠記録のみ修正できます。管理者は全利用者の勤怠記録を修正できます。
        修正時は reason が必須で、変更前後の値、実行者、実行日時、修正理由を変更履歴として必ず保存します。
      parameters:
        - in: path
          name: attendance_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendancePatchRequest'
      responses:
        '200':
          description: 勤怠修正成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '403':
          description: 権限不足（他人の勤怠記録を修正しようとした場合を含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象レコードなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attendance/{attendance_id}/history:
    get:
      tags: [Attendance]
      summary: 勤怠変更履歴を取得（本人または管理者）
      description: >-
        利用者本人は自分の勤怠記録の変更履歴を取得できます。管理者は全利用者の変更履歴を取得できます。
      parameters:
        - in: path
          name: attendance_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 勤怠変更履歴
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceHistoryResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 対象レコードなし
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /shifts/sync:
    post:
      tags: [Shift]
      summary: Google Calendar 同期を実行
      responses:
        '202':
          description: 同期受付完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftSyncAcceptedResponse'

  /settings:
    get:
      tags: [Settings]
      summary: システム設定を取得（管理者）
      description: >
        現在の全システム設定値を返す。DB 未設定のキーは環境変数またはコードのデフォルト値を返す。
      responses:
        '200':
          description: 設定値取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足（admin 以外）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Settings]
      summary: システム設定を更新（管理者）
      description: >
        指定したキーの設定値を upsert する。更新後の全設定値を返す。
        少なくとも 1 フィールドを指定すること（空 body は 422）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsPatchRequest'
      responses:
        '200':
          description: 更新成功。更新後の全設定値を返す。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足（admin 以外）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: バリデーションエラー（空 body、範囲外の値を含む）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /settings/export:
    get:
      tags: [Settings]
      summary: 設定を JSON ファイルとしてエクスポート（管理者）
      description: >
        現在の全設定値をメタデータ付き JSON ファイルとして返す。
        `Content-Disposition: attachment; filename="kint-settings-YYYYMMDD.json"` を返す。
      responses:
        '200':
          description: エクスポート成功
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="kint-settings-20260517.json"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsExportFile'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足（admin 以外）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /settings/import:
    post:
      tags: [Settings]
      summary: 設定を JSON ファイルからインポート（管理者）
      description: >
        エクスポートファイル形式の JSON を受け取り、設定値を一括適用する。
        `dry_run=true` で差分プレビューのみ返す（DB 書き込みなし）。
        不明なキーは ignored_keys に追記してスキップする。
      parameters:
        - in: query
          name: dry_run
          required: false
          schema:
            type: boolean
            default: false
          description: true のとき DB への書き込みを行わずプレビューを返す
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsImportRequest'
      responses:
        '200':
          description: インポート成功（dry_run 時はプレビュー結果）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsImportResult'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足（admin 以外）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: JSON 形式不正、設定値の範囲違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required: [id, role, name, full_name, email]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [admin, employee]
        name:
          type: string
        full_name:
          type: string
          description: 本名（氏名）
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        email_verification_status:
          type: string
          enum: [pending, verified]

    UserCreateRequest:
      type: object
      required: [name, full_name, email, role, password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        full_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, employee]
        password:
          type: string
          minLength: 8
          maxLength: 72
          pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'

    UserUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        full_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, employee]
        is_active:
          type: boolean

    MeProfileUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        full_name:
          type: string
          minLength: 1
          maxLength: 100

    EmailChangeRequestCreate:
      type: object
      required: [new_email]
      properties:
        new_email:
          type: string
          format: email

    EmailChangeRequestAcceptedResponse:
      type: object
      required: [status, requested_email]
      properties:
        status:
          type: string
          enum: [pending_confirmation]
        requested_email:
          type: string
          format: email
        expires_at:
          type: string
          format: date-time

    EmailVerificationConfirmRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    EmailVerificationConfirmResponse:
      type: object
      required: [verification_type, email, status]
      properties:
        verification_type:
          type: string
          enum: [signup, email_change]
        email:
          type: string
          format: email
        status:
          type: string
          enum: [confirmed]

    PasswordChangeRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 8
        new_password:
          type: string
          minLength: 8
          maxLength: 72
          pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'

    UserResponse:
      type: object
      required: [id, name, full_name, email, role, is_active, email_verification_status]
      properties:
        id:
          type: string
        name:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, employee]
        is_active:
          type: boolean
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        email_verification_status:
          type: string
          enum: [pending, verified]

    PunchRequest:
      type: object
      required: [device_id, occurred_at]
      oneOf:
        - required: [card_idm]
        - required: [user_id, reason]
      properties:
        card_idm:
          type: string
          description: FeliCa の IDm
        user_id:
          type: string
          description: カード忘れ時に使用するユーザーID
        reason:
          type: string
          description: user_id 打刻時の理由
          minLength: 1
        device_id:
          type: string
        occurred_at:
          type: string
          format: date-time
        confirm:
          type: boolean
          default: false
          description: シフト外打刻をユーザー確認済みとして確定するフラグ

    PunchResponse:
      type: object
      required: [status, user_id, user_name, occurred_at, method, message]
      properties:
        status:
          type: string
          enum: [completed, requires_confirmation]
          description: 打刻確定済みか、ユーザー確認待ちかを表す
        attendance_id:
          type: string
          nullable: true
        user_id:
          type: string
        user_name:
          type: string
        action:
          type: string
          enum: [check_in, check_out]
          nullable: true
        occurred_at:
          type: string
          format: date-time
        method:
          type: string
          enum: [card_idm, user_id]
          description: 打刻に使用した識別方法
        message:
          type: string

    PunchUserCandidate:
      type: object
      required: [id, name, full_name]
      properties:
        id:
          type: string
          description: ユーザーID
        name:
          type: string
          description: 表示名
        full_name:
          type: string
          description: 氏名

    PunchUserCandidateListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/PunchUserCandidate'

    CardRegistrationRequest:
      type: object
      required: [user_id, card_idm]
      properties:
        user_id:
          type: string
        card_idm:
          type: string

    CardRegistrationResponse:
      type: object
      required: [card_id, user_id, card_idm, is_active]
      properties:
        card_id:
          type: string
        user_id:
          type: string
        card_idm:
          type: string
        is_active:
          type: boolean

    AttendanceRecord:
      type: object
      required: [id, user_id, work_date]
      properties:
        id:
          type: string
        user_id:
          type: string
        card_idm:
          type: string
          nullable: true
        work_date:
          type: string
          format: date
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        source:
          type: string
          enum: [webusb_nfc, web_user_id, admin_manual, self_service]
        updated_reason:
          type: string
          nullable: true
        last_updated_at:
          type: string
          format: date-time
          nullable: true
        last_updated_by_user_id:
          type: string
          nullable: true

    AttendanceHistorySnapshot:
      type: object
      properties:
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true

    AttendanceHistoryEntry:
      type: object
      required: [id, attendance_id, actor_user_id, actor_role, changed_at, before, after, reason]
      properties:
        id:
          type: string
        attendance_id:
          type: string
        actor_user_id:
          type: string
        actor_role:
          type: string
          enum: [admin, employee]
        changed_at:
          type: string
          format: date-time
        before:
          $ref: '#/components/schemas/AttendanceHistorySnapshot'
        after:
          $ref: '#/components/schemas/AttendanceHistorySnapshot'
        reason:
          type: string

    AttendanceListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecord'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    AttendancePatchRequest:
      type: object
      required: [reason]
      properties:
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          minLength: 1
          description: 修正理由。監査ログに保存されます。

    AttendanceHistoryResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceHistoryEntry'
        total:
          type: integer

    ShiftSyncAcceptedResponse:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [accepted]

    SettingsResponse:
      type: object
      required: [punch_cooldown_seconds, shift_checkin_early_minutes]
      properties:
        punch_cooldown_seconds:
          type: integer
          description: 連続打刻防止クールダウン（秒）
          example: 60
        shift_checkin_early_minutes:
          type: integer
          description: シフト開始前チェックイン許容時間（分）
          example: 15
        shift_ical_url:
          type: string
          nullable: true
          description: シフト iCal 同期 URL（未設定時は null）
          example: "https://example.com/calendar.ics"
        shift_sync_time:
          type: string
          nullable: true
          description: iCal 自動同期の実行時刻（HH:MM 形式、24時間表記）。null / 未設定で自動同期 OFF
          example: "03:00"

    SettingsPatchRequest:
      type: object
      minProperties: 1
      properties:
        punch_cooldown_seconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: 連続打刻防止クールダウン（秒）
        shift_checkin_early_minutes:
          type: integer
          minimum: 0
          maximum: 120
          description: シフト開始前チェックイン許容時間（分）
        shift_ical_url:
          type: string
          nullable: true
          description: シフト iCal 同期 URL。null または空文字列で未設定にする。
        shift_sync_time:
          type: string
          nullable: true
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: >-
            iCal 自動同期の実行時刻（HH:MM、24時間表記）。
            null または空文字列で自動同期 OFF。形式不正は 422。
          example: "03:00"

    SettingsExportFile:
      type: object
      required: [version, exported_at, exported_by, settings]
      properties:
        version:
          type: string
          description: ファイルフォーマットバージョン
          example: "1"
        exported_at:
          type: string
          format: date-time
          description: エクスポート日時 (ISO 8601)
        exported_by:
          type: string
          format: email
          description: エクスポート実行者のメールアドレス
        settings:
          $ref: '#/components/schemas/SettingsResponse'

    SettingsImportRequest:
      type: object
      required: [version, settings]
      properties:
        version:
          type: string
          description: ファイルフォーマットバージョン（未知のバージョンは warnings に追記し続行）
          example: "1"
        exported_at:
          type: string
          format: date-time
          description: エクスポート日時（履歴表示用、任意）
        exported_by:
          type: string
          description: エクスポート者（履歴表示用、任意）
        settings:
          type: object
          description: インポートする設定値マップ。不明なキーは ignored_keys に追記されスキップ。
          additionalProperties:
            type: string
          example:
            punch_cooldown_seconds: "120"
            shift_checkin_early_minutes: "15"
            shift_ical_url: "https://example.com/calendar.ics"

    SettingsImportChange:
      type: object
      required: [key, before, after]
      properties:
        key:
          type: string
          description: 設定キー
        before:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
          description: 変更前の値
        after:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
          description: 変更後の値

    SettingsImportResult:
      type: object
      required: [dry_run, changes, ignored_keys, warnings]
      properties:
        dry_run:
          type: boolean
          description: true のときは DB 書き込みなし
        changes:
          type: array
          items:
            $ref: '#/components/schemas/SettingsImportChange'
          description: 実際に変更される（された）項目の一覧
        ignored_keys:
          type: array
          items:
            type: string
          description: 不明なキーまたは値が変化しなかったキー
        warnings:
          type: array
          items:
            type: string
          description: バージョン不一致など注意事項
        applied:
          $ref: '#/components/schemas/SettingsResponse'
          description: dry_run=false のときのみ包含。適用後の全設定値。

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 機械判読用エラーコード
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
